# Expires map
map $sent_http_content_type $expires {
    default                    off;
    text/html                  epoch;
    text/css                   max;
    application/json           max;
    application/javascript     max;
    ~image/                    max;
}

server {
  listen 80;
  location __ENDPOINT__ {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ __ENDPOINT__/index.html =404;
  }
  location /Home/Login {
    default_type text/html;
    return 200 "<!DOCTYPE html><h2>EHLO</h2>\n";
    keepalive_timeout 0;
  }
  expires $expires;
  gzip  on;
}
